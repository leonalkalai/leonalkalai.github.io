<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Object</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <canvas id="goo-canvas"></canvas>

    <script type="module">
      import * as THREE from 'https://esm.sh/three@0.136.0/build/three.module.js';
      import { OrbitControls } from 'https://esm.sh/three@0.136.0/examples/jsm/controls/OrbitControls.js';

      const canvas = document.querySelector('#goo-canvas');

      const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true,
        premultipliedAlpha: false
      });

      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      scene.background = null;

      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.z = 4.2;

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enableZoom = false;
      controls.enablePan = false;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.8;

      const light = new THREE.PointLight(0xffffff, 1.15);
      light.position.set(5, 5, 5);
      scene.add(light);

      const ambientLight = new THREE.AmbientLight(0x66ffff, 0.35);
      scene.add(ambientLight);

      const rotatingGroup = new THREE.Group();
      scene.add(rotatingGroup);

      const innerGeometry = new THREE.IcosahedronGeometry(1, 3);
      const innerMaterial = new THREE.MeshStandardMaterial({
        color: 0x222222,
        roughness: 0.5,
        metalness: 1,
        flatShading: true,
        transparent: true,
        opacity: 0.68
      });

      const innerMesh = new THREE.Mesh(innerGeometry, innerMaterial);
      rotatingGroup.add(innerMesh);

      const outerGeometry = new THREE.IcosahedronGeometry(1.15, 3);
      const wireframeMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.16
      });

      const wireframeMesh = new THREE.Mesh(outerGeometry, wireframeMaterial);
      rotatingGroup.add(wireframeMesh);

      const positions = [];
      const posAttr = outerGeometry.attributes.position;

      for (let i = 0; i < posAttr.count; i++) {
        positions.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
      }

      const particleGeometry = new THREE.BufferGeometry();
      particleGeometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(positions, 3)
      );

      const particleMaterial = new THREE.PointsMaterial({
        color: 'cyan',
        size: 0.026,
        transparent: true,
        opacity: 0.95
      });

      const particles = new THREE.Points(particleGeometry, particleMaterial);
      rotatingGroup.add(particles);

      function resize() {
        const width = canvas.clientWidth || window.innerWidth;
        const height = canvas.clientHeight || window.innerHeight;

        camera.aspect = width / height;
        camera.updateProjectionMatrix();

        renderer.setSize(width, height, false);
      }

      window.addEventListener('resize', resize);
      resize();

      function animate() {
        requestAnimationFrame(animate);

        controls.update();

        rotatingGroup.rotation.x += 0.002;
        rotatingGroup.rotation.y += 0.003;

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
